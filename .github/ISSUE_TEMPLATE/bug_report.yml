name: Bug report
description: Something is not working as expected.
labels: ["bug", "triage"]
assignees:
  - caalvaro

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to file a bug report. Please fill out all sections
        so we can reproduce and fix the issue quickly.

  - type: input
    id: version
    attributes:
      label: Package version
      description: Output of `youtube-summarizer --version` or `pip show youtube-summarizer`.
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      description: Output of `python --version`.
      placeholder: "3.12.3"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14.4 / Ubuntu 22.04 / Windows 11"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal command or code snippet that triggers the bug.
      render: shell
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste the full error traceback if applicable.
      render: shell
