name: Feature request
description: Suggest a new feature or enhancement.
labels: ["enhancement"]
assignees:
  - caalvaro

body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: >
        Describe the use case or limitation that motivates this request.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why you prefer your proposal.

  - type: checkboxes
    id: phase
    attributes:
      label: Which pipeline phase does this relate to?
      options:
        - label: "Phase 1 — caption extraction & Markdown restructuring"
        - label: "Phase 2 — frame selection via Claude vision"
        - label: "Phase 3 — illustrated ebook assembly"
        - label: "Developer experience / tooling"
        - label: "Documentation"
